# HTTP — Certbot will add SSL and a second server block for :443.
# Install: sudo cp deploy/nginx-mcp.paysats.exchange.conf /etc/nginx/sites-available/paysats-mcp
#          sudo ln -sf /etc/nginx/sites-available/paysats-mcp /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# TLS:     sudo certbot --nginx -d mcp.paysats.exchange

server {
    listen 80;
    listen [::]:80;
    server_name mcp.paysats.exchange;

    # JSON-RPC bodies are small; allow a little headroom for tool args.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:3333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamable HTTP can keep idle connections open for SSE-style flush.
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
